---
name: Stress in different isolations - Kata Containers QEMU
author: Arne Tarara <arne@green-coding.io>
description: Testing stress-ng in different isolations

isolation:
  type: vm
  backend: kata-qemu

services:
  test-container:
    image: alpine:latest
    setup-commands:
      - command: apk add stress-ng

flow:
  - name: Running Command
    container: test-container
    commands:
      - type: console
        command: __GMT_VAR_COMMAND__
        note: Running __GMT_VAR_COMMAND__
