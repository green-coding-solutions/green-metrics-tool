name: Django Web Application
author: David Kopp
description: Test

compose-file: !include docker-compose.yml

services:
  curl:
    image: curlimages/curl:8.10.1
    entrypoint: sleep infinity
    setup-commands:
      - command: sleep 5

flow:
  - name: Hello World
    container: curl
    commands:
      - type: console
        # --retry-connrefused: the Django dev server can take longer than the setup-commands sleep
        # to start listening under load (e.g. many other containers competing for CPU on the same
        # host under parallel test workers), so retry instead of failing on the first refused connection.
        command: curl --retry 10 --retry-connrefused --retry-delay 1 http://__GMT_VAR_WEB_HOST__:8000
        note: Hello World
