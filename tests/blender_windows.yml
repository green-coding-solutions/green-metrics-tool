name: Blender Windows Benchmark
author: max <dein@email.de>
description: Blender Cycles render benchmark on Windows via WSL2
flow:
  - name: Blender Render
    container: windows-host
    commands:
      - type: windows
        command: '"C:\Program Files\Blender Foundation\Blender 5.1\blender.exe" --background "C:\blender_benchmark\lone-monk.blend" --python-expr "import bpy; bpy.context.scene.cycles.samples = 32" --render-frame 1'
        log-stdout: true
        log-stderr: true
